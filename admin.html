<!DOCTYPE html>
<html>
<head>
    <title>Admin GorrosQX</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #eee; }
        .panel { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        button { background: #574964; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; font-weight: bold;}
    </style>
</head>
<body>

<div class="panel">
    <h2>Actualizar Stock</h2>
    <p>Producto: <strong>Alcalde Cs</strong></p>
    <input type="number" id="nuevo-stock" placeholder="Nuevo número de stock">
    <button onclick="actualizar()">Guardar Cambios</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // USA LAS MISMAS CLAVES QUE EN EL INDEX
    const firebaseConfig = {
        apiKey: "AIzaSyDjJGxz3rqwKRY1mQsakSqJPGVfF_rYdp0",
        authDomain: "gorrosqx.firebaseapp.com",
        databaseURL: "https://gorrosqx-default-rtdb.firebaseio.com",
        projectId: "gorrosqx",
        storageBucket: "gorrosqx.firebasestorage.app",
        messagingSenderId: "675780481076",
        appId: "1:675780481076:web:d048283127414361583a61"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function actualizar() {
        const valor = document.getElementById('nuevo-stock').value;
        if(valor === "") return alert("Pon un número, we");

        db.ref('Cs').update({
            stock: parseInt(valor)
        }).then(() => {
            alert("¡Stock actualizado en la nube!");
        });
    }
</script>
</body>
</html>
